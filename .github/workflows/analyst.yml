name: Demented Analyst Bot Execution

on:
  schedule:
    - cron: "0 */4 * * *"  # Every 4 hours
  workflow_dispatch:      # Manual trigger for Samrat

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install requests

      - name: Run Analyst Mission
        env:
          ANALYST_BOT_TOKEN: ${{ secrets.ANALYST_BOT_TOKEN }}
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: python analyst_bot.py
